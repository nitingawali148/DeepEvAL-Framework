[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --tb=short
    --color=yes
    --html=reports/report.html
    --self-contained-html
markers =
    chatbot: tests against Subsystem A
    rag: tests against Subsystem B
    safety: bias / toxicity / PII
    quality: faithfulness / relevancy / hallucination
    retrieval: contextual precision / recall / relevancy
    geval: G-Eval custom metrics
    conversational: multi-turn metrics
    slow: tests that hit live LLM judges (skip with -m "not slow")
filterwarnings =
    ignore::DeprecationWarning
